<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal File Converter</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>Universal File Converter</h1>

    <p class="subtitle">
        Convert Images, PDFs, Office Documents and Audio Files
    </p>

    <form action="/convert" method="POST" enctype="multipart/form-data">

        <div class="upload-box" id="drop-area">

            <input
                type="file"
                id="file"
                name="file"
                accept=".jpg,.jpeg,.png,.webp,.pdf,.doc,.docx,.odt,.txt,.rtf,.xls,.xlsx,.ods,.ppt,.pptx,.odp,.mp3,.wav,.flac,.ogg,.aac,.m4a,.wma,.aiff"
                required
            >

            <label for="file" id="upload-label">
                📁 Drag & Drop File Here
                <br>
                <span>or click to browse</span>
            </label>

        </div>

        <div id="preview-container" style="display:none;">
            <img
                id="preview-image"
                src=""
                alt="Preview"
                style="max-width:250px;border-radius:10px;">
        </div>

        <br>

        <label><strong>Convert To</strong></label>

        <select name="format" id="format" required>
            <option value="PNG">PNG</option>
            <option value="JPG">JPG</option>
            <option value="WEBP">WEBP</option>
            <option value="PDF">PDF</option>
        </select>

        <br><br>

        <button type="submit">
            Convert File
        </button>

    </form>

</div>

<script>

const fileInput = document.getElementById("file");
const previewContainer = document.getElementById("preview-container");
const previewImage = document.getElementById("preview-image");
const uploadLabel = document.getElementById("upload-label");
const format = document.getElementById("format");

fileInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) return;

    uploadLabel.innerHTML =
        "✅ " + file.name +
        "<br><span>Ready to convert</span>";

    const ext = file.name.split(".").pop().toLowerCase();

    // Show preview only for image files
    if (["jpg","jpeg","png","webp"].includes(ext)) {

        const reader = new FileReader();

        reader.onload = function(e){

            previewImage.src = e.target.result;
            previewContainer.style.display = "block";

        }

        reader.readAsDataURL(file);

    } else {

        previewContainer.style.display = "none";

    }

    format.innerHTML = "";

    // Images and PDFs
    if (["jpg","jpeg","png","webp","pdf"].includes(ext)) {

        format.innerHTML += "<option value='PNG'>PNG</option>";
        format.innerHTML += "<option value='JPG'>JPG</option>";
        format.innerHTML += "<option value='WEBP'>WEBP</option>";
        format.innerHTML += "<option value='PDF'>PDF</option>";

    }

    // Office Documents
    else if (["doc","docx","odt","txt","rtf","ppt","pptx","odp","xls","xlsx","ods"].includes(ext)) {

        format.innerHTML += "<option value='PDF'>PDF</option>";

    }

    // Audio Files
    else if (["mp3","wav","flac","ogg","aac","m4a","wma","aiff"].includes(ext)) {

        format.innerHTML += "<option value='MP3'>MP3</option>";
        format.innerHTML += "<option value='WAV'>WAV</option>";

    }

});

</script>

</body>
</html>
